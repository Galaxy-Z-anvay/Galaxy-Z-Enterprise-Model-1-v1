<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy Z AI Assistant</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    
    :root {
      --primary: #4E94E9;
      --secondary: #9079D1;
      --accent: #CE6372;
      --bg-dark: #0a0a1a;
      --bg-card: #12122a;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
    }
    
    .font-display { font-family: 'Space Grotesk', sans-serif; }
    
    .gradient-bg {
      background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1a3a 50%, var(--bg-dark) 100%);
    }
    
    .glass-card {
      background: rgba(18, 18, 42, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(78, 148, 233, 0.2);
    }
    
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: float 8s ease-in-out infinite;
    }
    
    .orb-1 {
      width: 300px;
      height: 300px;
      background: var(--primary);
      top: -100px;
      right: -100px;
      animation-delay: 0s;
    }
    
    .orb-2 {
      width: 250px;
      height: 250px;
      background: var(--secondary);
      bottom: -50px;
      left: -50px;
      animation-delay: -3s;
    }
    
    .orb-3 {
      width: 200px;
      height: 200px;
      background: var(--accent);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -5s;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }
    
    @keyframes pulse-ring {
      0% { transform: scale(0.8); opacity: 0.8; }
      50% { transform: scale(1.2); opacity: 0.3; }
      100% { transform: scale(0.8); opacity: 0.8; }
    }
    
    @keyframes voice-wave {
      0%, 100% { height: 8px; }
      50% { height: 32px; }
    }
    
    .voice-btn {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      transition: all 0.3s ease;
    }
    
    .voice-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 40px rgba(78, 148, 233, 0.5);
    }
    
    .voice-btn.recording {
      background: linear-gradient(135deg, var(--accent) 0%, var(--secondary) 100%);
      animation: pulse-ring 1.5s ease-in-out infinite;
    }
    
    .voice-wave {
      width: 4px;
      background: white;
      border-radius: 2px;
      transition: height 0.1s ease;
    }
    
    .recording .voice-wave {
      animation: voice-wave 0.5s ease-in-out infinite;
    }
    
    .recording .voice-wave:nth-child(1) { animation-delay: 0s; }
    .recording .voice-wave:nth-child(2) { animation-delay: 0.1s; }
    .recording .voice-wave:nth-child(3) { animation-delay: 0.2s; }
    .recording .voice-wave:nth-child(4) { animation-delay: 0.1s; }
    .recording .voice-wave:nth-child(5) { animation-delay: 0s; }
    
    .message {
      animation: slideIn 0.3s ease-out;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      display: inline-block;
      animation: typing 1.4s infinite ease-in-out;
    }
    
    .typing-indicator span:nth-child(1) { animation-delay: 0s; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }
    
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    .speaker-btn {
      transition: all 0.2s ease;
    }
    
    .speaker-btn:hover {
      color: var(--primary);
    }
    
    .speaker-btn.speaking {
      color: var(--accent);
      animation: pulse-ring 1s ease-in-out infinite;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full gradient-bg relative overflow-hidden flex flex-col"><!-- Background Orbs -->
   <div class="orb orb-1"></div>
   <div class="orb orb-2"></div>
   <div class="orb orb-3"></div><!-- Main Container -->
   <div class="relative z-10 flex flex-col h-full w-full max-w-4xl mx-auto p-4 md:p-6"><!-- Header -->
    <header class="text-center mb-4 flex-shrink-0">
     <div class="inline-flex items-center gap-3 mb-2">
      <div class="w-12 h-12 rounded-full bg-gradient-to-br from-[#4E94E9] via-[#9079D1] to-[#CE6372] flex items-center justify-center">
       <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
       </svg>
      </div>
      <h1 id="assistant-title" class="font-display text-3xl md:text-4xl font-bold text-white">Galaxy Z</h1>
     </div>
     <p id="welcome-text" class="text-gray-400 text-sm md:text-base">Hello! I'm Galaxy Z, your AI assistant. Tap the microphone to speak or type below.</p>
    </header><!-- API Key Input (shown initially) -->
    <div id="api-key-section" class="glass-card rounded-2xl p-6 mb-4 flex-shrink-0"><label class="block text-white font-medium mb-2">Enter your Groq API Key</label>
     <div class="flex gap-3"><input type="password" id="api-key-input" placeholder="gsk_..." class="flex-1 bg-[#1a1a3a] border border-[#4E94E9]/30 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#4E94E9] transition-colors"> <button id="save-key-btn" class="px-6 py-3 bg-gradient-to-r from-[#4E94E9] to-[#9079D1] text-white font-medium rounded-xl hover:opacity-90 transition-opacity"> Connect </button>
     </div>
     <p class="text-gray-500 text-xs mt-2">Your API key is stored locally and never shared.</p>
    </div><!-- Chat Container -->
    <div id="chat-section" class="hidden flex-1 flex flex-col min-h-0"><!-- Messages Area -->
     <div id="messages" class="flex-1 overflow-y-auto scrollbar-hide space-y-4 mb-4 pr-2"><!-- Messages will be inserted here -->
     </div><!-- Voice Button -->
     <div class="flex justify-center mb-4 flex-shrink-0"><button id="voice-btn" class="voice-btn w-20 h-20 md:w-24 md:h-24 rounded-full flex items-center justify-center gap-1 shadow-2xl" title="Hold to speak">
       <div class="voice-wave" style="height: 12px;"></div>
       <div class="voice-wave" style="height: 20px;"></div>
       <div class="voice-wave" style="height: 28px;"></div>
       <div class="voice-wave" style="height: 20px;"></div>
       <div class="voice-wave" style="height: 12px;"></div></button>
     </div><!-- Text Input -->
     <div class="glass-card rounded-2xl p-3 flex gap-3 flex-shrink-0"><input type="text" id="text-input" placeholder="Type your message..." class="flex-1 bg-transparent text-white placeholder-gray-500 focus:outline-none px-2"> <button id="send-btn" class="px-5 py-2 bg-gradient-to-r from-[#4E94E9] to-[#9079D1] text-white font-medium rounded-xl hover:opacity-90 transition-opacity"> Send </button>
     </div>
    </div>
   </div><!-- Status Toast -->
   <div id="status-toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 px-4 py-2 bg-[#12122a] border border-[#4E94E9]/30 rounded-full text-white text-sm opacity-0 transition-opacity pointer-events-none"><span id="status-text">Listening...</span>
   </div>
  </div>
  <script>
    // Default configuration
    const defaultConfig = {
      assistant_name: 'Galaxy Z',
      welcome_message: "Hello! I'm Galaxy Z, your AI assistant. Tap the microphone to speak or type below.",
      primary_color: '#4E94E9',
      secondary_color: '#9079D1',
      accent_color: '#CE6372',
      text_color: '#ffffff',
      background_color: '#0a0a1a'
    };

    let config = { ...defaultConfig };
    let apiKey = '';
    let isRecording = false;
    let recognition = null;
    let synthesis = window.speechSynthesis;
    let currentUtterance = null;

    // DOM Elements
    const apiKeySection = document.getElementById('api-key-section');
    const chatSection = document.getElementById('chat-section');
    const apiKeyInput = document.getElementById('api-key-input');
    const saveKeyBtn = document.getElementById('save-key-btn');
    const messagesContainer = document.getElementById('messages');
    const voiceBtn = document.getElementById('voice-btn');
    const textInput = document.getElementById('text-input');
    const sendBtn = document.getElementById('send-btn');
    const statusToast = document.getElementById('status-toast');
    const statusText = document.getElementById('status-text');
    const assistantTitle = document.getElementById('assistant-title');
    const welcomeText = document.getElementById('welcome-text');

    // Initialize Speech Recognition
    function initSpeechRecognition() {
      if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.lang = 'en-US';

        recognition.onstart = () => {
          isRecording = true;
          voiceBtn.classList.add('recording');
          showStatus('Listening...');
        };

        recognition.onend = () => {
          isRecording = false;
          voiceBtn.classList.remove('recording');
          hideStatus();
        };

        recognition.onresult = (event) => {
          const transcript = Array.from(event.results)
            .map(result => result[0].transcript)
            .join('');
          
          if (event.results[0].isFinal) {
            sendMessage(transcript);
          }
        };

        recognition.onerror = (event) => {
          console.error('Speech recognition error:', event.error);
          isRecording = false;
          voiceBtn.classList.remove('recording');
          if (event.error !== 'no-speech') {
            showStatus('Voice input error. Try again.');
            setTimeout(hideStatus, 2000);
          }
        };
      }
    }

    // Show/Hide Status
    function showStatus(message) {
      statusText.textContent = message;
      statusToast.style.opacity = '1';
    }

    function hideStatus() {
      statusToast.style.opacity = '0';
    }

    // Add Message to Chat
    function addMessage(content, isUser = false, isTyping = false) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message flex ${isUser ? 'justify-end' : 'justify-start'}`;
      
      if (isTyping) {
        messageDiv.id = 'typing-indicator';
        messageDiv.innerHTML = `
          <div class="glass-card rounded-2xl px-5 py-4 max-w-[80%]">
            <div class="typing-indicator flex gap-1">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
        `;
      } else {
        const bgClass = isUser 
          ? 'bg-gradient-to-r from-[#4E94E9] to-[#9079D1]' 
          : 'glass-card';
        
        const speakerBtn = !isUser ? `
          <button class="speaker-btn mt-2 text-gray-400 hover:text-[#4E94E9] transition-colors flex items-center gap-1 text-xs" onclick="speakMessage(this, '${content.replace(/'/g, "\\'")}')">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/>
            </svg>
            <span>Listen</span>
          </button>
        ` : '';
        
        messageDiv.innerHTML = `
          <div class="${bgClass} rounded-2xl px-5 py-4 max-w-[80%]">
            <p class="text-white text-sm md:text-base leading-relaxed">${content}</p>
            ${speakerBtn}
          </div>
        `;
      }
      
      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
      
      return messageDiv;
    }

    // Remove Typing Indicator
    function removeTypingIndicator() {
      const typing = document.getElementById('typing-indicator');
      if (typing) typing.remove();
    }

    // Speak Message
    function speakMessage(btn, text) {
      // Stop any current speech
      if (synthesis.speaking) {
        synthesis.cancel();
        document.querySelectorAll('.speaker-btn').forEach(b => b.classList.remove('speaking'));
        if (currentUtterance && btn.classList.contains('speaking')) {
          btn.classList.remove('speaking');
          btn.querySelector('span').textContent = 'Listen';
          return;
        }
      }

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 1;
      utterance.pitch = 1;
      
      // Try to find a good voice
      const voices = synthesis.getVoices();
      const preferredVoice = voices.find(v => v.name.includes('Google') || v.name.includes('Samantha')) || voices[0];
      if (preferredVoice) utterance.voice = preferredVoice;

      btn.classList.add('speaking');
      btn.querySelector('span').textContent = 'Stop';
      currentUtterance = utterance;

      utterance.onend = () => {
        btn.classList.remove('speaking');
        btn.querySelector('span').textContent = 'Listen';
        currentUtterance = null;
      };

      utterance.onerror = () => {
        btn.classList.remove('speaking');
        btn.querySelector('span').textContent = 'Listen';
        currentUtterance = null;
      };

      synthesis.speak(utterance);
    }

    // Send Message to Groq API
    async function sendMessage(content) {
      if (!content.trim() || !apiKey) return;

      // Add user message
      addMessage(content, true);
      textInput.value = '';

      // Show typing indicator
      addMessage('', false, true);

      try {
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: 'llama-3.3-70b-versatile',
            messages: [
              {
                role: 'system',
                content: `You are ${config.assistant_name}, a helpful, friendly, and intelligent AI assistant. You speak naturally and conversationally. Keep responses concise but helpful. You have a warm personality and enjoy helping users with any questions or tasks they have.`
              },
              {
                role: 'user',
                content: content
              }
            ],
            temperature: 0.7,
            max_tokens: 1024
          })
        });

        removeTypingIndicator();

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error?.message || 'API request failed');
        }

        const data = await response.json();
        const assistantMessage = data.choices[0]?.message?.content || "I'm sorry, I couldn't generate a response.";
        
        // Add assistant message
        const messageEl = addMessage(assistantMessage, false);
        
        // Auto-speak the response
        setTimeout(() => {
          const speakerBtn = messageEl.querySelector('.speaker-btn');
          if (speakerBtn) {
            speakMessage(speakerBtn, assistantMessage);
          }
        }, 300);

      } catch (error) {
        removeTypingIndicator();
        console.error('Error:', error);
        addMessage(`Sorry, I encountered an error: ${error.message}. Please check your API key and try again.`, false);
      }
    }

    // Event Listeners
    saveKeyBtn.addEventListener('click', () => {
      const key = apiKeyInput.value.trim();
      if (key) {
        apiKey = key;
        apiKeySection.classList.add('hidden');
        chatSection.classList.remove('hidden');
        chatSection.classList.add('flex');
        
        // Add welcome message
        addMessage(`Hello! I'm ${config.assistant_name}. How can I help you today? You can speak to me by tapping the microphone button or type your message below.`, false);
      }
    });

    apiKeyInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        saveKeyBtn.click();
      }
    });

    voiceBtn.addEventListener('click', () => {
      if (!recognition) {
        showStatus('Voice input not supported in this browser');
        setTimeout(hideStatus, 2000);
        return;
      }

      if (isRecording) {
        recognition.stop();
      } else {
        recognition.start();
      }
    });

    sendBtn.addEventListener('click', () => {
      sendMessage(textInput.value);
    });

    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        sendMessage(textInput.value);
      }
    });

    // Initialize
    function init() {
      initSpeechRecognition();
      
      // Load voices
      if (synthesis.onvoiceschanged !== undefined) {
        synthesis.onvoiceschanged = () => synthesis.getVoices();
      }
    }

    // Element SDK Integration
    function onConfigChange(newConfig) {
      config = { ...defaultConfig, ...newConfig };
      
      assistantTitle.textContent = config.assistant_name || defaultConfig.assistant_name;
      welcomeText.textContent = config.welcome_message || defaultConfig.welcome_message;
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities: (cfg) => ({
          recolorables: [
            {
              get: () => cfg.background_color || defaultConfig.background_color,
              set: (v) => { cfg.background_color = v; window.elementSdk.setConfig({ background_color: v }); }
            },
            {
              get: () => cfg.primary_color || defaultConfig.primary_color,
              set: (v) => { cfg.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); }
            },
            {
              get: () => cfg.secondary_color || defaultConfig.secondary_color,
              set: (v) => { cfg.secondary_color = v; window.elementSdk.setConfig({ secondary_color: v }); }
            },
            {
              get: () => cfg.accent_color || defaultConfig.accent_color,
              set: (v) => { cfg.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); }
            },
            {
              get: () => cfg.text_color || defaultConfig.text_color,
              set: (v) => { cfg.text_color = v; window.elementSdk.setConfig({ text_color: v }); }
            }
          ],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (cfg) => new Map([
          ['assistant_name', cfg.assistant_name || defaultConfig.assistant_name],
          ['welcome_message', cfg.welcome_message || defaultConfig.welcome_message]
        ])
      });
    }

    init();
  </script>
